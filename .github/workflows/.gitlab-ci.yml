name: CI/CD Order Service

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Test
    runs-on:
      - self-hosted
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn clean verify -DskipTests

#  docker:
#    name: Docker Build and Push
#    needs: build
#    runs-on:
#      - self-hosted
#      - windows
#    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t krevskiigrigorii/order-service:latest order-service

      - name: Push image
        run: |
          docker push krevskiigrigorii/order-service:latest
  
  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on:
      - self-hosted
      - windows
    env:
      KUBECONFIG: ${{ github.workspace }}\kubeconfig.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        shell: powershell
        run: |
            "${{ secrets.KUBECONFIG_CONTENT }}" | Out-File `
            -FilePath $env:KUBECONFIG `
            -Encoding utf8

      - name: Kubernetes check
        run: |
            kubectl get nodes

