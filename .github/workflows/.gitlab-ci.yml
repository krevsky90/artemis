name: Hello Runner

on:
  push:
    branches:
      - master

jobs:
  hello:
    runs-on:
      - self-hosted
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hello
        run: |
          echo Hello from GitHub Actions
          hostname
          java -version
          docker --version
          kubectl version --client
          helm version

