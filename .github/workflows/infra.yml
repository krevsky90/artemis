name: Deploy infrastructure

on:
  # GitHub repo 'artemis' -> Actions
  # см 'Deploy Infrastructure'
  # там кнопка [ Run workflow ]
  workflow_dispatch:

jobs:
  infra:
    runs-on:
      - self-hosted
      - windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create namespaces
        run: |
          kubectl apply -f helm/infrastructure/namespaces/

      - name: Install PostgreSQL
        run: |
          helm upgrade --install postgres oci://registry-1.docker.io/bitnamicharts/postgresql -n infra -f helm/infrastructure/values/postgres.yaml

