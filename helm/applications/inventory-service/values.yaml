namespace: apps

replicaCount: 1

image:
  repository: krevskiigrigorii/inventory-service
  pullPolicy: IfNotPresent
  tag: "1.0"

containerPort:
  port: 8082

service:
  type: ClusterIP
  port: 8081

artemis:
  brokerUrl: tcp://artemis.infra:61616
  secretName: artemis-secret

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5