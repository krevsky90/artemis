image:
  repository: apache/activemq-artemis
  tag: "2.44.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  jmsPort: 61616
  consolePort: 8161

auth:
  username: admin
  password: admin

persistence:
  enabled: true
  size: 1Gi

#broker:
#  configPath: /var/lib/artemis-instance/etc

resources:
  requests:
    cpu: 250m
    memory: 512Mi

  limits:
    cpu: "1"
    memory: 1Gi